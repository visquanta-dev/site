  <rect x="0" y="0" width="1220" height="900" fill="url(#leftFade)"/>
  <rect x="0" y="0" width="2100" height="900" fill="url(#glow)"/>

  <text x="88" y="302" class="headline" font-size="110">
    <tspan x="88" dy="0">Buyers judge</tspan>
    <tspan x="88" dy="132">you by your</tspan>
    <tspan x="88" dy="132">replies.</tspan>
  </text>
  <text x="92" y="790" class="subline" font-size="78">Where are yours?</text>

