<svg xmlns="http://www.w3.org/2000/svg" width="2100" height="900" viewBox="0 0 2100 900" fill="none">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <linearGradient id="leftFade" x1="0" y1="0" x2="1180" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#06070C"/>
      <stop offset="0.46" stop-color="#0B0D14" stop-opacity="0.96"/>
      <stop offset="0.76" stop-color="#10131A" stop-opacity="0.58"/>
      <stop offset="1" stop-color="#10131A" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1080 380) rotate(141) scale(620 540)">
      <stop stop-color="#FF8A1F" stop-opacity="0.34"/>
      <stop offset="0.46" stop-color="#FF8A1F" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#FF8A1F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F5F6F8"/>
    </linearGradient>
    <style>
      .headline { font-family: Arial, Helvetica, sans-serif; font-weight: 700; fill: #FFFFFF; }
      .subline { font-family: Arial, Helvetica, sans-serif; font-weight: 500; fill: #FF7A1A; }
      .cardText { font-family: Arial, Helvetica, sans-serif; font-weight: 700; fill: #111827; }
    </style>
  </defs>

